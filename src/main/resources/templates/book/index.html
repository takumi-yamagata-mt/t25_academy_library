<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title} + ' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧</div>

                <div class="button_area" style="text-align: right; margin-bottom: 20px;">
                    <a th:href="@{/book/add}" class="register-button">
                        <i class="fas fa-plus-square"></i> 書籍登録
                    </a>
                </div>
                <div class="index-text">書籍一覧</div>

                  <div class="book_table">
                     <div style="margin: 0 auto; max-width: 700px;">
                         <table>
                             <thead>
                                 <tr>
                                     <th>書籍名</th>
                                    <th>ISBN</th>
                                 </tr>
                             </thead>
                            <tbody>
                              <tr th:each="book : ${bookMstList}">
                                     <td th:text="${book.title}"style="width: 70%;">書籍タイトル</td>
                                     <td th:text="${book.isbn}"style="width: 30%;">1234567890123</td>
                             </tr>
                            </tbody>
                         </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
</html>
